name: Deploy GitHub Pages

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: ["main"]
    paths:
      - "client/**"
      - "server/**"
      - "shared/**"
      - "scripts/smoke-test.mjs"
      - "package.json"
      - "pnpm-lock.yaml"
      - "vite.config.ts"
      - "tsconfig.json"
      - "tsconfig.node.json"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend for Pages
        env:
          VITE_BASE_PATH: /techgreen-platform/
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: pnpm exec vite build --base "$VITE_BASE_PATH"

      - name: Create static route entrypoints (200 for deep links)
        run: |
          routes=(
            learning
            open-data
            open-data/energy
            open-data/catalog
            components
          )
          for route in "${routes[@]}"; do
            mkdir -p "dist/public/$route"
            cp dist/public/index.html "dist/public/$route/index.html"
          done

      - name: Create SPA fallback (404.html)
        run: cp dist/public/index.html dist/public/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/public

  deploy:
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  smoke:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run smoke checks (frontend + api)
        env:
          FRONTEND_URL: ${{ needs.deploy.outputs.page_url }}
          API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          SMOKE_STRICT_EXTERNAL: "false"
          SMOKE_REPORT_PATH: artifacts/smoke-report.json
        run: node scripts/smoke-test.mjs

      - name: Upload smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-report
          path: artifacts/smoke-report.json
