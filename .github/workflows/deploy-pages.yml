name: Deploy GitHub Pages

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend for Pages
        env:
          VITE_BASE_PATH: /techgreen-platform/
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: pnpm exec vite build --base "$VITE_BASE_PATH"

      - name: Create SPA fallback (404.html)
        run: cp dist/public/index.html dist/public/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/public

  deploy:
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  smoke:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run smoke checks (frontend + api)
        env:
          FRONTEND_URL: ${{ needs.deploy.outputs.page_url }}
          API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          SMOKE_STRICT_EXTERNAL: "false"
          SMOKE_REPORT_PATH: artifacts/smoke-report.json
        run: node scripts/smoke-test.mjs

      - name: Upload smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-report
          path: artifacts/smoke-report.json

  ckan-postdeploy:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check CKAN health endpoint
        env:
          CKAN_BASE_URL: ${{ secrets.CKAN_BASE_URL }}
          CKAN_API_KEY: ${{ secrets.CKAN_API_KEY }}
        run: node scripts/ckan-health-check.mjs

      - name: Check TechGreen CKAN bridge (public/protected contract)
        env:
          API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          CKAN_SMOKE_REPORT_PATH: artifacts/techgreen-ckan-smoke-report.json
        run: node scripts/techgreen-ckan-smoke.mjs

      - name: Upload CKAN smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: techgreen-ckan-smoke-report
          path: artifacts/techgreen-ckan-smoke-report.json
