services:
  - type: web
    name: techgreen-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: pnpm install --frozen-lockfile && pnpm build
    startCommand: pnpm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: FRONTEND_ORIGINS
        value: https://oungnet.github.io
      - key: SESSION_COOKIE_SAMESITE
        value: none
